services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:main-slim
    container_name: openclaw-ai
    restart: unless-stopped
    ports:
      - "18789:18789"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/home/node/.openclaw
    environment:
      - OPENCLAW_GATEWAY_CONTROL_UI_ALLOW_INSECURE_AUTH=true
      - OPENCLAW_GATEWAY_CONTROL_UI_REQUIRE_DEVICE_IDENTITY=false
      - OPENCLAW_GATEWAY_TRUST_PROXY=true
    command: openclaw gateway --port 18789 --bind lan
