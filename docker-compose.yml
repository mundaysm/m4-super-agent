services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    # --- เพิ่ม 2 บรรทัดนี้ ---
    user: root
    network_mode: "host"
    # ----------------------
    environment:
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - NODE_OPTIONS=--max-old-space-size=4096
      - OPENCLAW_GATEWAY_AUTH_TOKEN=mysecret123
    # เอา volumes ออกไปก่อนครับ เพื่อให้มันสร้างไฟล์เองได้ตามปกติ
    restart: unless-stopped
