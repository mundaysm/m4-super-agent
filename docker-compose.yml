services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    ports:
      - "8000:18789"
    # ใช้ entrypoint เพื่อบังคับ Parameter ให้ตัวแอปโดยตรง
    entrypoint: ["node", "dist/gateway/index.js", "--host", "0.0.0.0", "--gateway.auth.token", "mysecrettoken123"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
